# 📁 Put this in your PRIVATE pipeline repo at:
#   .github/workflows/full-pipeline.yml

name: Full Pipeline

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: full
        type: choice
        options:
          - full
          - quick

permissions:
  contents: read

jobs:
  scrape-then-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trigger public scraper
        if: ${{ github.event.inputs.mode == 'full' }}
        run: |
          gh workflow run update-jobs.yml \
            --repo yvonnesilva404-debug/laughing-octo-fiesta
          sleep 6
          RUN_ID=$(gh run list \
            --repo yvonnesilva404-debug/laughing-octo-fiesta \
            --workflow update-jobs.yml \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId')
          echo "Scraper run ID: $RUN_ID"
          gh run watch "$RUN_ID" \
            --repo yvonnesilva404-debug/laughing-octo-fiesta \
            --exit-status
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

      - name: Checkout public aggregator data
        uses: actions/checkout@v4
        with:
          repository: yvonnesilva404-debug/laughing-octo-fiesta
          path: aggregator
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scoring + upload pipeline
        run: |
          python pipeline.py \
            --skip-scrape \
            --skip-pull \
            --skip-merge \
            --workers 8 \
            --upload-supabase \
            --supabase-url "${{ secrets.SUPABASE_URL }}" \
            --supabase-service-key "${{ secrets.SUPABASE_SERVICE_KEY }}"
        env:
          PYTHONUNBUFFERED: 1
